# Render blueprint — one-click deploy for the Duplicate-Skill Checker.
# No secrets required: the service only reads the public registry API.
services:
  - type: web
    name: dupcheck
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
